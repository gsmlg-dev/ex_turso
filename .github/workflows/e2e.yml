name: E2E

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version to test"
        required: true
        type: string
      run_cloud_sync:
        description: "Run Turso Cloud sync tests using repository secrets"
        required: false
        default: false
        type: boolean

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  release-smoke-test:
    name: Release artifact e2e
    runs-on: ubuntu-latest
    env:
      MIX_ENV: test
      VERSION: ${{ inputs.version }}
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Erlang and Elixir
        uses: erlef/setup-beam@v1
        with:
          otp-version: "28"
          elixir-version: "1.19"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/git
            ~/.cargo/registry
            release-artifacts/ex_turso-${{ inputs.version }}/native/ex_turso/target
          key: ${{ runner.os }}-cargo-e2e-${{ inputs.version }}
          restore-keys: |
            ${{ runner.os }}-cargo-e2e-
            ${{ runner.os }}-cargo-

      - name: Install Mix tooling
        run: |
          mix local.hex --force
          mix local.rebar --force

      - name: Run release artifact e2e suite
        run: ./e2e/scripts/run-release.sh "${VERSION}"

  cloud-sync:
    name: Release artifact cloud sync e2e
    if: ${{ inputs.run_cloud_sync }}
    runs-on: ubuntu-latest
    env:
      MIX_ENV: test
      VERSION: ${{ inputs.version }}
      GH_TOKEN: ${{ github.token }}
      TURSO_E2E_DATABASE_URL: ${{ secrets.TURSO_E2E_DATABASE_URL }}
      TURSO_E2E_AUTH_TOKEN: ${{ secrets.TURSO_E2E_AUTH_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Erlang and Elixir
        uses: erlef/setup-beam@v1
        with:
          otp-version: "28"
          elixir-version: "1.19"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/git
            ~/.cargo/registry
            release-artifacts/ex_turso-${{ inputs.version }}/native/ex_turso/target
          key: ${{ runner.os }}-cargo-e2e-cloud-${{ inputs.version }}
          restore-keys: |
            ${{ runner.os }}-cargo-e2e-cloud-
            ${{ runner.os }}-cargo-e2e-
            ${{ runner.os }}-cargo-

      - name: Install Mix tooling
        run: |
          mix local.hex --force
          mix local.rebar --force

      - name: Fetch release artifact
        run: |
          mkdir -p release-artifacts
          gh release download "v${VERSION}" \
            --pattern "ex_turso-${VERSION}-source.tar.gz" \
            --dir release-artifacts
          tar -xzf "release-artifacts/ex_turso-${VERSION}-source.tar.gz" -C release-artifacts

      - name: Run cloud sync e2e suite
        env:
          EX_TURSO_PATH: ${{ github.workspace }}/release-artifacts/ex_turso-${{ inputs.version }}
        run: ./e2e/scripts/run-cloud-sync.sh
